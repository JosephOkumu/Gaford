  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600;1,700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&display=swap"
    rel="stylesheet">

  <!-- Critical CSS for Loading Experience -->
  <style>
    #root {
      min-height: 100vh;
      background: #faf9f6;
      font-family: 'Playfair Display', serif;
      position: relative;
    }

    .loader-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .loader-text {
      font-size: 2rem;
      font-weight: 900;
      color: #f26619;
      text-transform: uppercase;
      letter-spacing: -0.05em;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0% {
        opacity: 0.5;
        transform: scale(0.98);
      }

      50% {
        opacity: 1;
        transform: scale(1);
      }

      100% {
        opacity: 0.5;
        transform: scale(0.98);
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="loader-container">
      <div class="loader-text">GaFORD<span style="font-style: italic; color: #f26619; opacity: 0.8;">...</span></div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
